<div class="h-screen overflow-y-scroll columns-2 md:columns-4 gap-4 p-4 space-y-4"
(scroll)="onScroll($event)"
#groupDiv

>
    @for(group of gifService.trendingGifGroup(); track $index){
    <div class="grid gap-4">
        @for (gif of group; track gif.url) {
        <div>
            <img class="h-auto max-w-full rounded-lg object-cover" [src]="gif.url" [alt]="gif.title">
        </div>
        }
    </div>
    }
</div>
